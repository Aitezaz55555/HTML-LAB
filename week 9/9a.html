    <body>
        <p style="color: aliceblue;">S.Aitezaz Kauser cse25051</p>
        <script>
            function evenodd(){
                var x=parseInt(document.getElementById("num1").value);
                if(x==0){
                    return "even";
                }
                else if(x%2==0){
                    return "even";  
                }
                else{
                    return "odd";
                }
            }
            function factorial(){
                var x=parseInt(document.getElementById("num3").value);
                var fac=1;
                for(var i=1;i<=x;i++){
                    fac*=i;
                }
                return fac;
            }
            function prime(){
                var x=parseInt(document.getElementById("num2").value);
                if(x<=1){
                    return "not prime";
                }
                for(var i=2;i<x;i++){
                    if(x%i==0){
                        return "not prime";
                    }
                }
                return "prime";
            }
            function amstrong(){
                var x=parseInt(document.getElementById("num4").value);
                var sum=0;
                var amstrong=x;
                var count=0;
                var temp1 = x;
                while(temp1>0){
                    var temp=x%10;
                    count++;
                    temp1=parseInt(temp1/10);
                }
                while(amstrong>0){
                    var temp = amstrong%10;
                    sum+=temp**count;
                    amstrong=parseInt(amstrong/10);
                }
                if(sum==x){
                    return "armstrong";
                }
                else{
                    return "not armstrong";
                }
            }
            function NumberOfDigits(){
                var x=parseInt(document.getElementById("num5").value);
                var count=0;
                var temp;
                while(x>0){
                    temp=x%10;
                    count++;
                    x=parseInt(x/10);
                }
                return count;
            }
        </script>

                <button type="button" onclick=" document.getElementById('even').innerHTML=evenodd()">even or odd</button>

            </div>
            <div class="frame2">

                <button type="button" onclick="document.getElementById('prime').innerHTML=prime()">prime or not</button>

            </div>
            <div class="frame3">

            <div class="frame4">
