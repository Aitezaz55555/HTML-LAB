<!DOCTYPE html>
<html>
    <body style="background-image: url('https://img.freepik.com/free-vector/abstract-low-poly-mesh-background-design_1048-7440.jpg?semt=ais_user_personalization&w=740&q=80'); background-size: cover;">
<div style="display: flex;flex-wrap: wrap;">
            <div style="margin-right: 10px;">
                <h1 style="text-align: center;">User Login</h1>
        <form action="/login_user" method="post">
            <table border="1" style="margin: auto;background-color:skyblue;" height="500px" width="600px"> 
                <tr>
                    <td>Username:</td>
                    <td><input type="text" name="username"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password"></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="Login">
                    <input type="reset" value="Reset"></td>
            </table>
        </form>
            </div>  
            <div>
                <h1 style="text-align: center;">User Registration</h1>
        <form action="/register_user" method="post">
            <table border="1" style="margin: auto;background-color:skyblue;" height="500px" width="600px"> 
                <tr>
                    <td>Full Name:</td>
                    <td><input type="text" name="fullname"></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td>Phone Number:</td>
                    <td><input type="number" name="phonenumber"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password"></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="Register">
                    <input type="reset" value="Reset"></td>
                </tr>
            </table>
            </div>
        </div>
    </body>
</html>
