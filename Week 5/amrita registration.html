<!DOCTYPE html>
<html>
    <head>
     <title>registration</title>  
     <link rel="stylesheet" href="styles 5c.css">
    </head>
    <body>
        <div class="container">
            <h1 style="text-align: left;">User Registration</h1>
        <form action="/register_user" method="post">
            <table border="1" style="margin: left ;;background-color:rgb(255, 255, 255, 0.25);backdrop-filter: blur(5px);" height="200px" width="200px"> 
                <tr>
                    <td>Username:</td>
                    <td><input type="text" name="username"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password"></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="Register">
                    <input type="reset" value="Reset"></td>
            </table>
        </form>

    </body>
