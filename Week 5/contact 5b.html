<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
</head>
<body style="background-color: white;">
  <h2>Contact Us</h2>
  <p>
    We’d love to hear from you! Whether you have questions about HTML, CSS, or JavaScript,
    feel free to reach out using the details below or the contact form.
  </p>

  <h3>Contact Details</h3>
  <p><strong>Email:</strong> example@email.com</p>
  <p><strong>Phone:</strong> +91-9876543210</p>
  <p><strong>Address:</strong> Amaravati, Andhra Pradesh, India</p>

  <h3>Send Us a Message</h3>
  <form>
    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name" placeholder="Your name"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Your email"><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" placeholder="Your message"></textarea><br><br>

    <input type="submit" value="Send">
  </form>
</body>
</html>
