<!DOCTYPE html>
<html>
    <head>
        <title>Clothing</title>
        <style>
        .container{
            display:grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: auto auto auto auto;
            gap: 10px;
            padding: 10px;
        }
        .card{
            border-radius: 10px;
            text-align: center;
        }
        .card:hover{
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        button{
            border-radius: 20px;
            padding: 10px;
            background-color: blue;
        }
        button:hover{
            background-color: blue;
            color: yellow;
            font-size: large;
        }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card">
                <img src="t shirt.jpg" alt="picture of a t-shirt">
                <h4>Graphic T-Shirt</h4>
                <p>Express your style with our trendy graphic t-shirts.</p>
                <p>₹499</p>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="Denim jeans.jpg" alt="picture of a jeans">
                <h4>Denim Jeans</h4>
                <p>Classic denim jeans for a timeless look.</p>
                <p>₹999</p>
                <button>Add to Cart</button>
            </div>
             <div class="card">
                <img src="summer.jpg" alt="picture of a t-shirt">
                <h4>Summer Dress</h4>
                <p>Stay cool and stylish with our summer dresses.</p>
                <p>₹1,499</p>
                <button>Add to Cart</button>
            </div>
             <div class="card">
                <img src="jacket.jpg" alt="picture of a jacket">
                <h4>Leather Jacket</h4>
                <p>Add an edge to your outfit with our leather jackets.</p>
                <p>₹2,999</p>
                <button>Add to Cart</button>

        </div>


    </body>
